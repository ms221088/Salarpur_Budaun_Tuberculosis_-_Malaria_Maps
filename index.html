    pct:{max:[0,.20,.50,.80,1.20,1.60,999],
         leg_hi:['0% — कोई केस नहीं','0.01–0.20% — निम्न','0.21–0.50% — सामान्य','0.51–0.80% — मध्यम','0.81–1.20% — उच्च','1.21–1.60% — अति उच्च','>1.60% — चरम'],
         leg_en:['0% — No cases','0.01–0.20% — Low','0.21–0.50% — Moderate','0.51–0.80% — Mod-High','0.81–1.20% — High','1.21–1.60% — Very High','>1.60% — Critical']},
    abs:{max:[0,2,5,10,20,34,999],
         leg_hi:['0 — कोई केस नहीं','1–2','3–5','6–10','11–20','21–34','>34'],
         leg_en:['0 — No cases','1–2','3–5','6–10','11–20','21–34','>34']},
    years:[['total','सभी वर्ष','All Years'],['y2023','2023','2023'],
           ['y2024','2024','2024'],['y2025','2025','2025']],
    tt_yrs:[2023,2024,2025],
    tab_pct:['मलेरिया बोझ (% जनसंख्या)','Malaria Burden (% Population)'],
    tab_abs:['मलेरिया केस (संख्या)','Malaria Cases (Count)'],
    leg_pct:['मलेरिया (% जनसंख्या)','Malaria (% Pop)'],
    leg_abs:['मलेरिया केस (संख्या)','Malaria Cases (Count)'],
    tt_total:['कुल केस:','Total cases:'],
    tt_burd:['मलेरिया %:','Malaria %:'],
    sub:['ग्राम-वार मलेरिया डेटा | 2023–2025','Village-wise Malaria Data | 2023–2025'],
    dis_lbl:['🦟 मलेरिया','🦟 Malaria']
  }
};
let dis='tb',tab='pct',yr='total',lang=0; // lang: 0=hi,1=en
function li(arr){return arr[lang];}
function getCol(v,mx){for(let i=0;i<mx.length;i++)if(v<=mx[i])return PAL[i];return PAL[PAL.length-1];}
function getD(){return dis==='tb'?(tab==='pct'?TB_PCT:TB_ABS):(tab==='pct'?MAL_PCT:MAL_ABS);}
function getMx(){return CFG[dis][tab].max;}
function getV(d){
  if(!d)return 0;
  return tab==='abs'?(yr==='total'?d.total||0:d[yr]||0):(yr==='total'?d.pct_total||0:d['pct_'+yr]||0);
}
function fmt(v){return tab==='pct'?v.toFixed(2)+'%':v;}

function rebuildYr(){
  const sel=document.getElementById('yr-sel');
  const yrs=CFG[dis].years;
  const valid=yrs.map(y=>y[0]);
  if(!valid.includes(yr))yr='total';
  sel.innerHTML=yrs.map(([v,hi,en])=>`<option value="${v}" ${yr===v?'selected':''}>${lang?en:hi}</option>`).join('');
}

function render(){
  yr=document.getElementById('yr-sel').value;
  const data=getD(), mx=getMx();
  document.querySelectorAll('#svgwrap svg path[id]').forEach(p=>{
    const d=data[p.id], v=getV(d);
    p.style.fill=getCol(v,mx);
    p.style.opacity='1';
    p.style.stroke=d?'#2a2a2a':'#1a1a1a';
    p.style.strokeWidth='0.5';
  });
  // Legend
  document.getElementById('leg-title').textContent=li(CFG[dis]['leg_'+tab]);
  const legArr=CFG[dis][tab]['leg_'+(lang?'en':'hi')];
  document.getElementById('leg-rows').innerHTML=legArr.map((l,i)=>
    `<div class="lrow"><div class="lbox" style="background:${PAL[i]}"></div><span class="llbl">${l}</span></div>`).join('');
  // Sidebar
  const items=Object.entries(data)
    .map(([id,d])=>{const v=getV(d);return{id,n:d.name,v};} )
    .filter(x=>x.v>0).sort((a,b)=>b.v-a.v).slice(0,40);
  const imx=items[0]?.v||1;
  document.getElementById('ranklist').innerHTML=items.map((x,i)=>{
    const col=getCol(x.v,mx);
    return `<div class="ri">
      <span style="color:#555;font-size:9px;min-width:16px;text-align:right">${i+1}</span>
      <div class="rb" style="width:${Math.round(x.v/imx*70)}px;background:${col}"></div>
      <span class="rn" title="${x.n}">${x.n}</span>
      <span class="rv">${fmt(x.v)}</span>
    </div>`;
  }).join('');
  renderLabels(data,mx);
}

function renderLabels(data,mx){
  const svgEl=document.querySelector('#svgwrap svg');
  if(!svgEl)return;
  const old=document.getElementById('lbl-layer');
  if(old)old.remove();
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('id','lbl-layer');
  g.setAttribute('pointer-events','none');
  const vals=Object.values(data).map(d=>getV(d));
  const vmx=Math.max(...vals,1);
  document.querySelectorAll('#svgwrap svg path[id]').forEach(p=>{
    const d=data[p.id]; if(!d)return;
    const v=getV(d);
    try{
      const box=p.getBBox();
      if(box.width<10||box.height<6)return;
      const cx=box.x+box.width/2, cy=box.y+box.height/2;
      const words=d.name.split(' ');
      const fs=Math.min(9.5,Math.max(4.5,box.width*0.115));
      const dark=v>vmx*0.42;
      const fc=dark?'#ffffff':'#111111';
      const nL=words.length, hasC=v>0;
      const totalH=(nL+(hasC?1:0))*fs*1.3;
      const sy=cy-totalH/2+fs*0.65;
      words.forEach((w,wi)=>{
        const t=document.createElementNS('http://www.w3.org/2000/svg','text');
        t.setAttribute('x',cx); t.setAttribute('y',sy+wi*fs*1.3);
        t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle');
        t.setAttribute('font-family','Noto Sans Devanagari,Arial Unicode MS,sans-serif');
        t.setAttribute('font-size',fs); t.setAttribute('font-weight','600');
        t.setAttribute('fill',fc); t.textContent=w;
        g.appendChild(t);
      });
      if(hasC){
        const sub=document.createElementNS('http://www.w3.org/2000/svg','text');
        sub.setAttribute('x',cx); sub.setAttribute('y',sy+nL*fs*1.3);
        sub.setAttribute('text-anchor','middle'); sub.setAttribute('dominant-baseline','middle');
        sub.setAttribute('font-family','Arial,sans-serif');
        sub.setAttribute('font-size',Math.max(4,fs*0.82));
        sub.setAttribute('fill',dark?'#ffe08a':'#444');
        sub.textContent='('+fmt(v)+')';
        g.appendChild(sub);
      }
    }catch(e){}
  });
  svgEl.appendChild(g);
}

function switchDis(d){
  dis=d;
  document.querySelectorAll('.dtab').forEach(el=>el.classList.toggle('active',el.dataset.dis===d));
  document.getElementById('dis-subtitle').textContent=li(CFG[d].sub);
  document.getElementById('tab-pct').textContent=li(CFG[d].tab_pct);
  document.getElementById('tab-abs').textContent=li(CFG[d].tab_abs);
  document.getElementById('yr-lbl').textContent=lang?'Year:':'वर्ष:';
  rebuildYr(); render();
}

function switchTab(t){
  tab=t;
  document.getElementById('tab-pct').classList.toggle('active',t==='pct');
  document.getElementById('tab-abs').classList.toggle('active',t==='abs');
  render();
}

function toggleLang(){
  lang=lang?0:1;
  document.getElementById('lang-btn').textContent=lang?'हिंदी':'English';
  document.getElementById('hdr-title').textContent=lang?'🏥 Disease Map — Salarpur Block, Badaun':'🏥 रोग मानचित्र — सलारपुर ब्लॉक, बदायूँ';
  document.getElementById('sb-title').textContent=lang?'Top Villages':'शीर्ष गाँव';
  document.getElementById('dtab-tb').textContent=li(CFG.tb.dis_lbl);
  document.getElementById('dtab-mal').textContent=li(CFG.mal.dis_lbl);
  switchDis(dis);
}

// Tooltip — reads dis/tab/lang dynamically from closure
const tt=document.getElementById('tt');
document.querySelectorAll('#svgwrap svg path[id]').forEach(p=>{
  p.style.cursor='pointer';
  p.addEventListener('mousemove',e=>{
    const id=p.id;
    const aD=dis==='tb'?TB_ABS:MAL_ABS, pD=dis==='tb'?TB_PCT:MAL_PCT;
    const dA=aD[id], dP=pD[id];
    if(!dA&&!dP){tt.style.display='none';return;}
    document.getElementById('tt-name').textContent=(dA||dP).name;
    const yrs=CFG[dis].tt_yrs;
    let h='';
    if(dA){
      h+=`<div class="ttr">${li(CFG[dis].tt_total)} <b>${dA.total}</b></div><div class="ttd"></div>`;
      yrs.forEach(y=>{const v=dA['y'+y]||0;h+=`<div class="ttr" style="opacity:${v?1:.3}">${y}: <b>${v}</b></div>`;});
    }
    if(dP&&dP.pop>0){
      h+=`<div class="ttd"></div>
          <div class="ttr">${lang?'Population:':'जनसंख्या:'} <b>${dP.pop.toLocaleString('hi-IN')}</b></div>
          <div class="ttr">${li(CFG[dis].tt_burd)} <b>${dP.pct_total.toFixed(2)}%</b></div>`;
    }
    if(!h)h=`<div style="color:#666;font-size:10px">${lang?'No data':'डेटा उपलब्ध नहीं'}</div>`;
    document.getElementById('tt-body').innerHTML=h;
    tt.style.display='block';
    tt.style.left=Math.min(e.clientX+14,window.innerWidth-260)+'px';
    tt.style.top=Math.max(e.clientY-10,10)+'px';
  });
  p.addEventListener('mouseleave',()=>{tt.style.display='none';});
});

switchDis('tb');
</script>
</body>
